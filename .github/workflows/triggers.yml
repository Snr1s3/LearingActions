name: Triggers 

on: 
    # Scheduled
    schedule:
      - cron: '0 4 * * *'

    # When pushing
    push:
        branches:
            - main

    # When pull request
    pull_request:
        branches:
            - main

    # When github pages is buils
    page_build:

    # When deploying a release
    release:
        types:
            - created

    # When manually triggered
    workflow_dispatch:
        inputs:
            bondia:
                description: 'Bon dia'
                required: false
                default: 'Bon Dia'
            logLevel:
                description: 'Log level'
                required: true
                default: 'warning'
            tags:
                description: 'Test scenario tags'

    # Webhoocked
    repository_dispatch:
        types: [run-tests]

    # When issues
    issues:
        types:
            - opened
            - edited
            - closed

jobs:
    build:
        name: Hello
        runs-on: ubuntu-latest
        steps:
          - name: Echo type of trigger
            run: echo "Triggered by ${{ github.event_name }}"
          - name: Show dispatch payload
            run: |
              echo "Triggered by ${{ github.event_name }}"
              echo "logLevel: ${{ github.event.client_payload.logLevel }}"
